<!DOCTYPE html>
<!-- 宣告文件類型為 HTML5 標準 -->
<html lang="zh-TW">
<!-- lang="zh-TW" 告知瀏覽器頁面語言為繁體中文，有助於無障礙工具與 SEO -->
<head>
  <meta charset="UTF-8">
  <!-- 指定字元編碼為 UTF-8，確保中文字元正確顯示 -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- viewport 設定：
       width=device-width      → 寬度等於裝置螢幕寬度（手機自適應）
       initial-scale=1.0       → 初始縮放比例為 1（不放大不縮小）
       maximum-scale=1.0       → 禁止放大，防止玩遊戲時誤觸雙指縮放
       user-scalable=no        → 同上，雙重保險禁止縮放 -->

  <title>蜈蚣貪食蛇</title>

  <style>
    /* ========================================================
       全域重置
       消除所有元素預設的 margin / padding，
       並使用 border-box 讓 width/height 包含 padding 和 border，
       避免元素尺寸計算錯誤。
    ======================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========================================================
       頁面主體 (body)
       使用 flexbox 垂直排列，將遊戲標題、畫布、方向鍵
       由上而下置中對齊。
    ======================================================== */
    body {
      background: #0d1b0d;          /* 深墨綠底色，呼應蜈蚣/森林主題 */
      display: flex;                 /* 啟用 flexbox 排版 */
      flex-direction: column;        /* 子元素垂直排列（由上到下） */
      align-items: center;           /* 水平置中 */
      justify-content: flex-start;   /* 從頂部開始排列（不強制垂直置中），避免手機高度不足時元素重疊 */
      min-height: 100vh;             /* 最小高度為整個視口高度，撐滿螢幕 */
      font-family: 'Arial', sans-serif; /* 使用無襯線字體，在各平台可讀性佳 */
      overflow-x: hidden;            /* 隱藏水平捲軸，避免超寬元素造成排版跑版 */
    }

    /* ========================================================
       遊戲標題列
    ======================================================== */
    #title {
      color: #f0e040;                /* 鮮黃色文字，醒目 */
      font-size: 20px;
      font-weight: bold;
      padding: 8px 0 4px 0;          /* 上下留白，左右不留白（已由 body 置中） */
      letter-spacing: 2px;           /* 字距稍寬，增加標題感 */
      text-shadow: 0 0 10px #ff0, 0 0 20px #f80;
      /* text-shadow 製造霓虹燈光暈效果：
         第一層：黃色近距離光暈
         第二層：橙色較遠光暈 */
    }

    /* ========================================================
       遊戲區塊外框容器
       Canvas 與 HUD（分數）、遮罩（Overlay）都疊在此容器內，
       使用 position:relative 讓子元素可以用 position:absolute 定位。
    ======================================================== */
    #game-wrapper {
      position: relative;  /* 建立定位參考點，子元素的 absolute 相對此容器定位 */
      width: 360px;        /* 固定寬度，等同 Canvas 寬度 */
      height: 600px;       /* 固定高度，等同 Canvas 高度 */
      flex-shrink: 0;      /* 禁止在 flex 容器中被壓縮，保持固定尺寸 */
    }

    /* ========================================================
       遊戲畫布 (Canvas)
    ======================================================== */
    #gameCanvas {
      display: block;                     /* 消除 inline 元素預設的底部空隙 */
      border: 2px solid #3a3a1a;          /* 深橄欖色邊框 */
      border-radius: 6px;                 /* 圓角讓外觀更柔和 */
      box-shadow: 0 0 20px rgba(200,180,0,0.3); /* 金黃色外發光，增加遊戲感 */
    }

    /* ========================================================
       HUD（平視顯示器）：分數列
       疊在 Canvas 上方，使用 absolute 定位。
       pointer-events:none 確保滑鼠/觸控事件穿透到 Canvas。
    ======================================================== */
    #hud {
      position: absolute;        /* 相對 #game-wrapper 定位，疊在 Canvas 上 */
      top: 8px;                  /* 距頂部 8px */
      left: 0; right: 0;         /* 左右拉滿容器寬度 */
      display: flex;
      justify-content: space-between; /* 分數和最高分分列左右兩端 */
      padding: 0 12px;           /* 左右內距，讓膠囊不貼邊 */
      pointer-events: none;      /* 不攔截點擊事件，觸控仍能傳到 Canvas */
      z-index: 10;               /* 確保 HUD 顯示在 Canvas 之上 */
    }

    /* 分數膠囊樣式 */
    .score-pill {
      background: rgba(0,0,0,0.65);          /* 半透明黑底，讓背景圖隱約可見 */
      color: #f0e040;                        /* 黃色文字 */
      padding: 4px 14px;
      border-radius: 20px;                   /* 膠囊形圓角 */
      font-size: 15px;
      font-weight: bold;
      border: 1px solid rgba(240,224,64,0.4); /* 淡黃色細邊框，呼應文字顏色 */
    }

    /* ========================================================
       遮罩層 (Overlay)
       開始畫面與遊戲結束畫面共用此元素，
       覆蓋整個 Canvas，顯示標題或結果。
    ======================================================== */
    #overlay {
      position: absolute;        /* 疊在 Canvas 正上方 */
      inset: 0;                  /* 等同 top:0; right:0; bottom:0; left:0; 完全覆蓋父容器 */
      background: rgba(0,0,0,0.80); /* 80% 透明度黑色蒙版 */
      display: flex;
      flex-direction: column;    /* 子元素垂直排列 */
      justify-content: center;   /* 垂直置中 */
      align-items: center;       /* 水平置中 */
      border-radius: 4px;
      z-index: 20;               /* 最高層，蓋過 HUD */
      gap: 10px;                 /* 子元素間距 10px */
    }

    /* 遮罩層標題文字 */
    #overlay h1 {
      font-size: 32px;
      color: #f0e040;
      text-shadow: 0 0 15px #ff8800; /* 橙色光暈 */
    }

    /* 遮罩層副標題文字（操作說明） */
    #overlay .sub {
      font-size: 15px;
      color: #ccc;
    }

    /* 遊戲結束時顯示的分數文字 */
    #overlay .final-score {
      font-size: 22px;
      color: #fff;
      font-weight: bold;
    }

    /* ========================================================
       開始 / 再玩一次 按鈕
    ======================================================== */
    #start-btn {
      margin-top: 10px;
      padding: 12px 36px;
      font-size: 18px;
      background: linear-gradient(135deg, #e67e22, #c0392b);
      /* 漸層背景：左上橙色 → 右下深紅，仿蜈蚣體色 */
      color: white;
      border: none;
      border-radius: 30px;       /* 膠囊形按鈕 */
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(230,126,34,0.5); /* 橙色投影增加立體感 */
      font-weight: bold;
      letter-spacing: 1px;
    }
    #start-btn:hover  { filter: brightness(1.15); }   /* 滑鼠懸停時增亮 15% */
    #start-btn:active { transform: scale(0.97); }     /* 按下時縮小 3%，模擬按壓反饋 */

    /* ========================================================
       手機方向鍵（D-Pad）
       3欄 x 2列的 Grid，上鍵在第1列中間，
       左/下/右鍵在第2列。
    ======================================================== */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px); /* 3 欄，每欄 56px */
      grid-template-rows: repeat(2, 56px);    /* 2 列，每列 56px */
      gap: 6px;
      margin-top: 10px;
    }

    /* 方向鍵按鈕共用樣式 */
    .dpad-btn {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.12);        /* 淡白半透明底 */
      border: 2px solid rgba(255,255,255,0.25);  /* 淡白邊框 */
      border-radius: 12px;
      font-size: 22px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;                         /* 防止長按選取文字 */
      -webkit-tap-highlight-color: transparent;  /* 消除 iOS Safari 觸控藍色高亮 */
    }
    .dpad-btn:active { background: rgba(255,255,255,0.3); } /* 按下時加亮，給觸控反饋 */
  </style>
</head>
<body>

<!-- =====================================================
     遊戲標題列
===================================================== -->
<div id="title">🐛 蜈蚣貪食蛇</div>

<!-- =====================================================
     遊戲主容器：內含 Canvas、HUD、開始/結束遮罩
===================================================== -->
<div id="game-wrapper">

  <!-- 遊戲畫布：所有遊戲畫面均由 JavaScript 繪製於此
       width/height 決定畫布解析度（像素），同時也是 CSS 尺寸 -->
  <canvas id="gameCanvas" width="360" height="600"></canvas>

  <!-- HUD：分數顯示，疊在畫布上方左右兩端 -->
  <div id="hud">
    <div class="score-pill">分數: <span id="score">0</span></div>
    <div class="score-pill">最高: <span id="hi-score">0</span></div>
  </div>

  <!-- 遮罩層：遊戲開始前顯示，遊戲結束後由 JS 動態更新內容 -->
  <div id="overlay">
    <h1>🐛 蜈蚣貪食蛇</h1>
    <div class="sub">方向鍵 / 滑動 / 按鈕控制</div>
    <!-- onclick 直接呼叫 JS 的 startGame()，點擊即開始 -->
    <button id="start-btn" onclick="startGame()">開始遊戲</button>
  </div>

</div><!-- /#game-wrapper -->

<!-- =====================================================
     虛擬方向鍵（手機用）
     Grid 佈局：第1格空白、第2格上、第3格空白
                第4格左、第5格下、第6格右
===================================================== -->
<div id="dpad">
  <div></div><!-- 佔位，讓「上」按鈕在中間欄 -->
  <div class="dpad-btn" id="btn-up">▲</div>
  <div></div><!-- 佔位 -->
  <div class="dpad-btn" id="btn-left">◄</div>
  <div class="dpad-btn" id="btn-down">▼</div>
  <div class="dpad-btn" id="btn-right">►</div>
</div>

<!-- =====================================================
     遊戲邏輯（JavaScript）
===================================================== -->
<script>
/* ============================================================
   畫布與繪圖上下文
   canvas  : HTML Canvas 元素本身（設定尺寸用）
   ctx     : 2D 繪圖上下文，所有畫線/填色操作都透過它
============================================================ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d'); // 取得 2D 繪圖介面

/* ============================================================
   遊戲常數（不會在執行期間改變的設定值）
   W, H  : 畫布寬高（像素）
   CELL  : 每個網格格子的邊長（像素）
            格子越小 → 地圖越大 → 遊戲難度較低
   COLS  : 水平方向格子數 = 360 / 20 = 18
   ROWS  : 垂直方向格子數 = 600 / 20 = 30
============================================================ */
const W    = canvas.width;   // 360
const H    = canvas.height;  // 600
const CELL = 20;             // 每格 20×20 像素
const COLS = W / CELL;       // 18 欄
const ROWS = H / CELL;       // 30 列

/* ============================================================
   背景圖片
   使用 Image 物件非同步載入，載入完成前畫布顯示純色底。
   圖片檔案須與此 HTML 放在同一目錄。
============================================================ */
const bgImg = new Image();
bgImg.src = 'snake_background.jpg'; // 背景圖檔名（與 HTML 同目錄）

/* ============================================================
   全域遊戲狀態變數
   snake   : 蜈蚣身體，陣列中每個元素為 {x, y} 格子座標
             index 0 = 頭部，最後一個 = 尾部
   dir     : 當前移動方向向量，如 {x:1, y:0} 代表向右
   nextDir : 下一步的方向（玩家輸入後暫存，避免同一幀內連按兩次反向自撞）
   food    : 食物的格子座標 {x, y}
   score   : 本局分數
   hiScore : 最高分（整個頁面生命週期內保留）
   ticker  : setInterval 回傳的計時器 ID，用來清除（停止）遊戲迴圈
   running : 遊戲是否正在執行中，用來過濾無效按鍵輸入
============================================================ */
let snake, dir, nextDir, food, score, hiScore = 0, ticker, running = false;

/* ============================================================
   initGame()
   每次開始新遊戲時呼叫，重置所有遊戲狀態。
============================================================ */
function initGame() {
  // 計算初始頭部位置：畫布格子的正中央
  const sx = Math.floor(COLS / 2); // 水平中心欄（第 9 欄，0-indexed）
  const sy = Math.floor(ROWS / 2); // 垂直中心列（第 15 列）

  // 建立初始蜈蚣：6 節身體，頭在中心，向左延伸
  // push({x: sx-i, y: sy}) → 頭在 (9,15)，尾在 (4,15)
  snake = [];
  for (let i = 0; i < 6; i++) snake.push({ x: sx - i, y: sy });

  // 初始移動方向：向右（+X 方向）
  dir = nextDir = { x: 1, y: 0 };

  score = 0;
  document.getElementById('score').textContent = 0; // 重置畫面分數顯示

  spawnFood(); // 隨機放置第一顆食物
}

/* ============================================================
   spawnFood()
   隨機在地圖上產生一顆食物，確保不會與蜈蚣身體重疊。
   使用 do-while 迴圈反覆抽取，直到找到空格為止。
============================================================ */
function spawnFood() {
  let p;
  do {
    p = {
      x: Math.floor(Math.random() * COLS), // 0 ~ COLS-1 的隨機整數
      y: Math.floor(Math.random() * ROWS)  // 0 ~ ROWS-1 的隨機整數
    };
  } while (snake.some(s => s.x === p.x && s.y === p.y));
  // some() 只要有任一節身體與候選位置重疊就返回 true，繼續抽取
  food = p;
}

/* ============================================================
   startGame()
   按下「開始遊戲」或「再玩一次」按鈕時呼叫。
   隱藏遮罩、初始化狀態、啟動遊戲計時器。
============================================================ */
function startGame() {
  document.getElementById('overlay').style.display = 'none'; // 隱藏開始/結束遮罩

  initGame();    // 重置所有遊戲狀態
  running = true;

  clearInterval(ticker); // 若前一局計時器仍存在，先清除避免疊加
  ticker = setInterval(step, 140);
  // setInterval 每 140 毫秒呼叫一次 step()（約 7 幀/秒），作為遊戲主迴圈
}

/* ============================================================
   step()
   遊戲主迴圈的每一幀邏輯：
   1. 套用玩家輸入的方向
   2. 計算新頭部位置
   3. 碰撞偵測（牆壁 / 自身）
   4. 移動蜈蚣（若吃到食物則增長，否則移動）
   5. 重新繪製畫面
============================================================ */
function step() {
  // 套用緩衝的方向（避免同一幀連按兩鍵導致 180° 反轉自撞）
  dir = nextDir;

  // 計算新頭部座標（在格子坐標系中移動一格）
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // ── 碰撞偵測 ──────────────────────────────────────────────
  // 牆壁碰撞：頭部超出格子範圍
  // 自身碰撞：頭部與任一節身體重疊（包含頭部本身移動後與舊位置重疊）
  if (
    head.x < 0 || head.x >= COLS ||  // 超出左/右邊界
    head.y < 0 || head.y >= ROWS ||  // 超出上/下邊界
    snake.some(s => s.x === head.x && s.y === head.y) // 撞到自己
  ) {
    gameOver();
    return; // 結束這一幀，不再繼續移動
  }

  // ── 移動蜈蚣 ──────────────────────────────────────────────
  // unshift 將新頭部插入陣列最前面（index 0）
  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    // 吃到食物：不移除尾部（蜈蚣增長一節）
    score += 10;
    document.getElementById('score').textContent = score;

    // 更新最高分
    if (score > hiScore) {
      hiScore = score;
      document.getElementById('hi-score').textContent = hiScore;
    }

    spawnFood(); // 重新產生食物

    // 每累積 50 分加速一次，最快間隔為 65ms（約 15 幀/秒）
    if (score % 50 === 0) {
      clearInterval(ticker);
      const speed = Math.max(65, 140 - Math.floor(score / 50) * 8);
      // score=50 → 132ms, score=100 → 124ms, ... 最快 65ms
      ticker = setInterval(step, speed);
    }
  } else {
    // 沒吃到食物：移除尾部最後一節，整體看起來是「前進一格」
    snake.pop();
  }

  draw(); // 更新畫面
}

/* ============================================================
   gameOver()
   遊戲結束處理：停止計時器、顯示結果遮罩。
============================================================ */
function gameOver() {
  running = false;
  clearInterval(ticker); // 停止遊戲迴圈
  draw(); // 繪製最後一幀（讓玩家看到撞擊的位置）

  // 動態更新遮罩內容為「遊戲結束」畫面
  const ol = document.getElementById('overlay');
  ol.innerHTML = `
    <h1 style="font-size:28px;color:#ff5555">💀 遊戲結束</h1>
    <div class="final-score">分數: ${score}</div>
    <div class="final-score" style="color:#f0e040">最高: ${hiScore}</div>
    <button id="start-btn" onclick="startGame()">再玩一次</button>
  `;
  ol.style.display = 'flex'; // 重新顯示遮罩
}

/* ============================================================
   draw()
   每幀的繪製入口，依序繪製背景 → 食物 → 蜈蚣，
   確保蜈蚣永遠在食物上方（後繪製的覆蓋先繪製的）。
============================================================ */
function draw() {
  drawBg();         // 1. 繪製背景與格線
  drawFood();       // 2. 繪製食物
  drawCentipede();  // 3. 繪製蜈蚣（最上層）
}

/* ============================================================
   drawBg()
   繪製背景：
   - 若背景圖已載入完成，以「裁切填滿」方式繪製（Cover），
     保持圖片比例並覆蓋整個畫布，再疊上半透明深色蒙版降低亮度，
     讓蜈蚣和食物清晰可見。
   - 若圖片未載入，改用純色底。
   - 最後繪製淡色網格線，方便玩家判斷格子位置。
============================================================ */
function drawBg() {
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    // ── 計算「Cover」裁切參數 ───────────────────────────────
    // ir = 圖片寬高比；cr = 畫布寬高比
    const ir = bgImg.naturalWidth / bgImg.naturalHeight;
    const cr = W / H;

    let sx, sy, sw, sh; // 來源裁切區域（圖片座標系）
    if (ir > cr) {
      // 圖片比畫布「更寬」→ 以圖片高度為準，裁掉左右多餘部分
      sh = bgImg.naturalHeight;
      sw = sh * cr;                      // 裁切寬度 = 高度 × 畫布比例
      sx = (bgImg.naturalWidth - sw) / 2; // 水平置中裁切
      sy = 0;
    } else {
      // 圖片比畫布「更高」→ 以圖片寬度為準，裁掉上下多餘部分
      sw = bgImg.naturalWidth;
      sh = sw / cr;                        // 裁切高度 = 寬度 ÷ 畫布比例
      sx = 0;
      sy = (bgImg.naturalHeight - sh) / 2; // 垂直置中裁切
    }

    // 以 32% 透明度繪製背景圖，保持隱約可見但不干擾遊戲元素
    ctx.save();
    ctx.globalAlpha = 0.32;
    ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, W, H);
    ctx.restore(); // 恢復 globalAlpha = 1

    // 疊上深色蒙版（60% 不透明），進一步壓暗背景
    ctx.fillStyle = 'rgba(5,15,5,0.60)';
  } else {
    // 背景圖未載入時的純色替代方案
    ctx.fillStyle = '#0d1f0d';
  }
  ctx.fillRect(0, 0, W, H); // 填滿整個畫布（蒙版或純色底）

  // ── 繪製格線 ───────────────────────────────────────────────
  // 極低透明度（3.5%）的白線，隱約可見即可
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 0.5;

  // 垂直線：從 x=0 到 x=COLS，每隔 CELL 像素畫一條
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, H);
    ctx.stroke();
  }
  // 水平線：從 y=0 到 y=ROWS，每隔 CELL 像素畫一條
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(W, y * CELL);
    ctx.stroke();
  }
}

/* ============================================================
   drawFood()
   繪製食物（紅色蘋果造型）：
   - 放射狀漸層模擬立體球體感
   - 橢圓形高光模擬反光
   - 貝茲曲線繪製蘋果梗
   - shadowBlur 製造紅色發光效果
============================================================ */
function drawFood() {
  /* 食物：杯子蛋糕造型（s2.png 風格）
     由下至上繪製：梯形杯紙（深/亮綠條紋）→ 黃色圓頂奶油 → 紅色頂部櫻桃
     所有元素均帶粗黑輪廓，呈現卡通扁平風格。 */
  const cx = food.x * CELL + CELL / 2;
  const cy = food.y * CELL + CELL / 2 + 1; // 略向下偏移，讓頂部櫻桃不超出格子
  const r  = CELL / 2 - 1;                 // 基準半徑 ≈ 9px

  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // ── 杯紙（梯形底部，約佔下方 45%） ──────────────────────────
  // 頂部較寬、底部略窄，模擬紙杯向下收口的形狀
  const wtop = cy + r * 0.05; // 杯紙頂部 Y（接近垂直中線）
  const wbot = cy + r;        // 杯紙底部 Y
  const wtw  = r * 1.2;       // 頂部半寬
  const wbw  = r * 0.85;      // 底部半寬（比頂部窄，形成梯形）

  ctx.fillStyle   = '#2e7d32'; // 深綠主體色
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - wtw, wtop);  // 左上角
  ctx.lineTo(cx + wtw, wtop);  // 右上角
  ctx.lineTo(cx + wbw, wbot);  // 右下角
  ctx.lineTo(cx - wbw, wbot);  // 左下角
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 亮綠直條紋：3 條垂直線，模擬波紋/折紋杯紙
  ctx.strokeStyle = '#66bb6a';
  ctx.lineWidth   = 1.0;
  [-0.5, 0, 0.5].forEach(t => {
    ctx.beginPath();
    ctx.moveTo(cx + t * wtw * 0.88, wtop + 1);  // 頂端起點
    ctx.lineTo(cx + t * wbw * 0.88, wbot - 1);  // 底端終點
    ctx.stroke();
  });

  // ── 奶油圓頂（黃色，約佔上方 55%） ──────────────────────────
  // 用上半圓弧 + 兩側垂線構成倒 U 形，連接至杯紙頂端
  const fcy = cy - r * 0.4;  // 奶油中心 Y（在格子中線以上）
  const fr  = r * 1.05;      // 奶油主半徑（略大，形成飽滿感）

  ctx.fillStyle   = '#f5d060'; // 奶黃色
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(cx, fcy, fr, Math.PI, 0);  // 上半圓弧（左 180 度 → 右 0 度）
  ctx.lineTo(cx + fr, wtop);          // 右側向下接至杯紙頂
  ctx.lineTo(cx - fr, wtop);          // 左側向下接至杯紙頂
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 奶油上的三顆小黑點（裝飾，模擬巧克力豆）
  ctx.fillStyle = '#1a1a1a';
  [[-r * 0.42, r * 0.1], [r * 0.06, -r * 0.24], [r * 0.43, r * 0.1]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.arc(cx + dx, fcy + dy, 1.4, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── 頂部紅色櫻桃 ──────────────────────────────────────────────
  const chy = fcy - fr + 1; // 奶油頂端 Y（放置櫻桃的位置）
  const chr = r * 0.28;     // 櫻桃半徑

  // 梗（短曲線，從櫻桃底部向上彎）
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx, chy + chr);
  ctx.quadraticCurveTo(cx + 2, chy, cx + 1, chy - chr - 2);
  ctx.stroke();

  // 櫻桃圓體（紅色）
  ctx.fillStyle   = '#e53935';
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 1.2;
  ctx.beginPath();
  ctx.arc(cx, chy, chr, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 高光（左上小白點，模擬球面反光）
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.arc(cx - chr * 0.28, chy - chr * 0.28, chr * 0.28, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

/* ============================================================
   segAngle(i)
   計算蜈蚣第 i 節的朝向角度（弧度）。
   規則：每節朝向其「前一節」的方向（從後往前看）。
   - 頭部（i=0）：朝向從第 1 節指向第 0 節的方向
   - 中間節：朝向從 i+1 節指向 i 節的方向
   - 尾部（i=n-1）：用倒數第二節的方向補齊
   回傳值為 Math.atan2 計算的角度，+X 軸 = 0 弧度。
============================================================ */
function segAngle(i) {
  const n = snake.length;
  if (i === 0 && n > 1)
    return Math.atan2(snake[0].y - snake[1].y, snake[0].x - snake[1].x);
  if (i < n - 1)
    return Math.atan2(snake[i].y - snake[i + 1].y, snake[i].x - snake[i + 1].x);
  // 尾節：與倒數第二節同方向
  return Math.atan2(snake[n - 2].y - snake[n - 1].y, snake[n - 2].x - snake[n - 1].x);
}

/* ============================================================
   drawCentipede()
   從尾部往頭部倒序繪製，確保頭部最後繪製（顯示在最上層）。
   每節先將畫布原點平移到節點中心，再旋轉至朝向角度，
   使後續繪製函式能以「+X = 前方」的局部坐標系工作。
============================================================ */
function drawCentipede() {
  /* 從尾部往頭部倒序繪製，確保頭部最後繪製（顯示在最上層）。
     - 第 0 節：頭部（drawHead）
     - 最後一節：尾節（drawTail，含尾刺）
     - 其餘節：普通節體（drawSegment） */
  for (let i = snake.length - 1; i >= 0; i--) {
    const s     = snake[i];
    const cx    = s.x * CELL + CELL / 2; // 格子中心 X 像素座標
    const cy    = s.y * CELL + CELL / 2; // 格子中心 Y 像素座標
    const angle = segAngle(i);           // 該節面向角度（弧度）

    ctx.save();
    ctx.translate(cx, cy); // 平移原點到節點中心
    ctx.rotate(angle);     // 旋轉使 +X 對齊前進方向

    if (i === 0)                     drawHead();     // 頭部
    else if (i === snake.length - 1) drawTail(i);   // 尾節（含尾刺）
    else                             drawSegment(i); // 普通節體

    ctx.restore();
  }
}

/* ============================================================
   drawHead()
   繪製蜈蚣頭部，在局部坐標系中（原點=頭部中心，+X=前方）繪製：
   - 橢圓形頭部本體（橘紅色漸層）
   - 兩顆眼睛（位於 ±Y 方向，即左右兩側）
   - 兩根觸角（向 +X 延伸，帶紅色球形末端）
   - 兩根大顎（向前斜伸）
============================================================ */
function drawHead() {
  /* 頭部造型（s1.png 風格）：
     深暗紅褐色橢圓，左右兩側各一顆大圓眼（白眼球 + 黑瞳孔 + 高光），
     前端伸出兩根彎曲觸角（末端紅球）。
     局部坐標系：+X = 前進方向，±Y = 兩側（垂直於前進方向）。 */
  const r = CELL / 2 - 1;

  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // ── 頭部橢圓本體（暗紅褐色） ────────────────────────────────
  ctx.fillStyle   = '#5c1212'; // 深暗紅褐
  ctx.strokeStyle = '#180606'; // 極深紅黑輪廓
  ctx.lineWidth   = 1.8;
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 頭部甲殼光澤（放射狀漸層疊在本體上方，模擬頭甲弧面反光）
  const hg = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r);
  hg.addColorStop(0,   'rgba(220,80,60,0.30)');  // 受光點略亮橙紅
  hg.addColorStop(0.6, 'rgba(0,0,0,0)');          // 邊緣透明
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── 眼睛（位於 ±Y 兩側，即蜈蚣左右） ──────────────────────
  // ex：眼睛略微偏前（+X 方向）
  // ey：眼睛到中心的橫向距離（±Y 方向）
  // er：眼白圓半徑
  const ex = r * 0.05;
  const ey = r * 0.42;
  const er = r * 0.30;

  [[-ey], [ey]].forEach(([yp]) => {
    // 眼白
    ctx.fillStyle   = 'white';
    ctx.strokeStyle = '#180606';
    ctx.lineWidth   = 1.0;
    ctx.beginPath();
    ctx.arc(ex, yp, er, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 瞳孔（略偏前方，模擬注視前方的效果）
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(ex + er * 0.22, yp, er * 0.58, 0, Math.PI * 2);
    ctx.fill();

    // 眼睛高光（左上小白點，增加靈動感）
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.arc(ex + er * 0.05, yp - er * 0.25, er * 0.24, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── 觸角（從頭前端向外彎曲，末端有紅色球） ─────────────────
  // 觸角根部在頭部前側（+X, ±Y），二次貝茲曲線向前外彎
  ctx.strokeStyle = '#3a0808';
  ctx.lineWidth   = 1.5;

  [[-1], [1]].forEach(([s]) => {
    ctx.beginPath();
    ctx.moveTo(r * 0.55, s * r * 0.2);                           // 根部（頭前端側緣）
    ctx.quadraticCurveTo(r * 1.1, s * r * 0.52, r * 1.2, s * r * 0.92); // 向外前方彎曲
    ctx.stroke();

    // 末端紅色球（蜈蚣觸角末端的球狀感覺器）
    ctx.fillStyle   = '#cc2020';
    ctx.strokeStyle = '#180606';
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.arc(r * 1.2, s * r * 0.92, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });

  ctx.restore();
}

/* ============================================================
   drawSegment(i)
   繪製蜈蚣身體節，在局部坐標系（+X=前方）中繪製：
   - 橢圓形節體（奇偶節交替橙/黃漸層）
   - 橫向摺痕線（模擬節肢關節紋）
   - 每節 4 條關節腳（上下各 2 條，帶小爪）
   - 節中心小暗點
============================================================ */
function drawSegment(i) {
  /* 身體節造型（s1.png 風格）：
     深灰藍橢圓（奇偶節微差色），甲殼光澤漸層，
     橫向分節線，左右各 2 條折線腳（帶關節）。
     局部坐標系：+X = 前進方向，±Y = 兩側。 */
  const r   = CELL / 2 - 1;
  const alt = i % 2 === 0; // 偶數節略亮灰，奇數節略深，形成分節感

  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // ── 節體橢圓（接近頭部的暗紅褐兩色交替） ──────────────────────
  ctx.fillStyle   = alt ? '#581010' : '#4a0d0d'; // 偶數節暗紅褐 / 奇數節更深紅褐
  ctx.strokeStyle = '#180606';                   // 極深紅黑輪廓（與頭部一致）
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.82, r * 0.72, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 節體上半部光澤（線性漸層，模擬甲殼弧面反光）
  const sg = ctx.createLinearGradient(0, -r * 0.7, 0, r * 0.1);
  sg.addColorStop(0, 'rgba(200,100,80,0.28)');  // 頂部略亮（受光，紅褐色調）
  sg.addColorStop(1, 'rgba(0,0,0,0)');           // 底部透明
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.82, r * 0.72, 0, 0, Math.PI * 2);
  ctx.fill();

  // 橫向分節線（節體中央橫紋，模擬前後甲殼板交界縫）
  ctx.strokeStyle = 'rgba(15,14,25,0.65)';
  ctx.lineWidth   = 0.8;
  ctx.beginPath();
  ctx.moveTo(-r * 0.5, 0);
  ctx.lineTo( r * 0.5, 0);
  ctx.stroke();

  // ── 腳（每側 2 條，前後各一，共 4 條） ──────────────────────
  // 腳從節體側邊（±Y 邊緣）向外延伸，帶一個關節折角，末端略向後收
  ctx.strokeStyle = alt ? '#7a2020' : '#661a1a'; // 腳色跟隨節體（暗紅褐略亮）
  ctx.lineWidth   = 1.2;

  const legY = r * 0.62; // 腳根 Y 座標（節體側邊緣）

  [[-1], [1]].forEach(([side]) => {
    // 前腳（靠近頭側，X 偏正）
    ctx.beginPath();
    ctx.moveTo( r * 0.18, side * legY);
    ctx.lineTo( r * 0.18 - side * r * 0.18, side * (legY + r * 0.42));
    ctx.lineTo( r * 0.08, side * (legY + r * 0.80));
    ctx.stroke();

    // 後腳（靠近尾側，X 偏負）
    ctx.beginPath();
    ctx.moveTo(-r * 0.18, side * legY);
    ctx.lineTo(-r * 0.18 - side * r * 0.18, side * (legY + r * 0.42));
    ctx.lineTo(-r * 0.08, side * (legY + r * 0.80));
    ctx.stroke();
  });

  ctx.restore();
}

function drawTail(i) {
  /* 尾節：在普通身體節的基礎上，向後（-X 方向）延伸兩根尖刺，
     模擬蜈蚣尾端的尾肢（cerci），對應 s1.png 的尾部造型。 */
  const r = CELL / 2 - 1;

  drawSegment(i); // 先繪製普通節體（含自己的 save/restore）

  // 尾刺：從節體後端（-X 側）向後外斜伸出
  ctx.strokeStyle = '#3a3848';
  ctx.lineWidth   = 1.8;
  ctx.lineCap     = 'round';

  // 上尾刺（向後上方斜出）
  ctx.beginPath();
  ctx.moveTo(-r * 0.55, -r * 0.18);
  ctx.lineTo(-r * 1.55, -r * 0.52);
  ctx.stroke();

  // 下尾刺（向後下方斜出）
  ctx.beginPath();
  ctx.moveTo(-r * 0.55,  r * 0.18);
  ctx.lineTo(-r * 1.55,  r * 0.52);
  ctx.stroke();
}

/* ============================================================
   鍵盤輸入處理
   監聽 keydown 事件，將方向鍵對應為方向向量並存入 nextDir。
   防反向規則：不允許 180° 急轉（例如向右時不能直接轉左），
   避免蜈蚣頭部撞到緊鄰的身體節而瞬間死亡。
   e.preventDefault() 阻止方向鍵捲動頁面。
============================================================ */
document.addEventListener('keydown', e => {
  if (!running) return; // 遊戲未在執行時忽略按鍵
  const k = e.key;
  if (k === 'ArrowUp'    && dir.y !== 1)  { nextDir = {x:0,  y:-1}; e.preventDefault(); }
  if (k === 'ArrowDown'  && dir.y !== -1) { nextDir = {x:0,  y:1};  e.preventDefault(); }
  if (k === 'ArrowLeft'  && dir.x !== 1)  { nextDir = {x:-1, y:0};  e.preventDefault(); }
  if (k === 'ArrowRight' && dir.x !== -1) { nextDir = {x:1,  y:0};  e.preventDefault(); }
  // dir.y !== 1  → 目前不是向下，才允許轉向上（防止反向）
  // 其餘方向同理
});

/* ============================================================
   觸控滑動控制（手機用）
   記錄 touchstart 的起點座標，在 touchend 計算滑動向量，
   以水平/垂直分量較大者決定轉向方向。
   最小滑動距離 18px，避免誤觸。
   passive:false 允許在事件中呼叫 preventDefault()，
   防止瀏覽器預設的觸控捲動行為干擾遊戲。
============================================================ */
let ts = null; // 觸控起點座標，null 表示目前沒有進行中的觸控

canvas.addEventListener('touchstart', e => {
  ts = { x: e.touches[0].clientX, y: e.touches[0].clientY }; // 記錄觸控起點
  e.preventDefault(); // 阻止頁面滾動
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!ts || !running) return; // 沒有起點或遊戲停止則忽略

  const dx = e.changedTouches[0].clientX - ts.x; // 水平位移（正=向右）
  const dy = e.changedTouches[0].clientY - ts.y; // 垂直位移（正=向下）

  if (Math.abs(dx) > Math.abs(dy)) {
    // 水平滑動較大 → 判斷為左右方向
    if (dx > 18  && dir.x !== -1) nextDir = { x:1,  y:0 };  // 向右滑 → 轉右
    else if (dx < -18 && dir.x !== 1)  nextDir = { x:-1, y:0 };  // 向左滑 → 轉左
  } else {
    // 垂直滑動較大 → 判斷為上下方向
    if (dy > 18  && dir.y !== -1) nextDir = { x:0,  y:1 };  // 向下滑 → 轉下
    else if (dy < -18 && dir.y !== 1)  nextDir = { x:0,  y:-1 }; // 向上滑 → 轉上
  }

  ts = null;           // 清除起點，等待下次觸控
  e.preventDefault();
}, { passive: false });

/* ============================================================
   虛擬方向鍵按鈕事件
   點擊畫面下方的 ▲▼◄► 按鈕觸發轉向，邏輯與鍵盤相同。
============================================================ */
document.getElementById('btn-up').addEventListener('click',
  () => { if (running && dir.y !== 1)  nextDir = { x:0,  y:-1 }; });
document.getElementById('btn-down').addEventListener('click',
  () => { if (running && dir.y !== -1) nextDir = { x:0,  y:1  }; });
document.getElementById('btn-left').addEventListener('click',
  () => { if (running && dir.x !== 1)  nextDir = { x:-1, y:0  }; });
document.getElementById('btn-right').addEventListener('click',
  () => { if (running && dir.x !== -1) nextDir = { x:1,  y:0  }; });

/* ============================================================
   初始化背景繪製
   bgImg.onload：圖片載入完成後立即重繪背景（更新顯示）
   drawBg()    ：頁面開啟時先繪製一次（此時可能圖片尚未載入，
                 會顯示純色底，載入完成後 onload 再更新）
============================================================ */
bgImg.onload = () => drawBg();
drawBg(); // 開啟頁面立即繪製背景，不等待按下開始鍵
</script>
</body>
</html>
